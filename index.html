<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Solar System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    canvas { display: block; }

    /* ── Top Bar ─────────────────────────────────────── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(180deg, rgba(0,0,0,.7) 0%, transparent 100%);
      pointer-events: none;
    }

    .top-bar h1 {
      font-size: 1.3rem; font-weight: 600; letter-spacing: .5px;
      text-shadow: 0 0 20px rgba(100,180,255,.6);
    }

    .top-bar .controls { pointer-events: auto; display: flex; gap: 10px; align-items: center; }

    .speed-control {
      display: flex; align-items: center; gap: 8px; font-size: .85rem; color: #aac;
    }

    .speed-control input[type=range] {
      width: 100px; accent-color: #6af; cursor: pointer;
    }

    /* ── Planet Info Panel ───────────────────────────── */
    .info-panel {
      position: fixed; top: 60px; right: -420px; width: 380px; z-index: 20;
      background: rgba(10, 15, 30, .92);
      border: 1px solid rgba(100, 170, 255, .25);
      border-radius: 16px; padding: 28px 24px;
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 8px 32px rgba(0,0,0,.5), inset 0 0 60px rgba(80,140,255,.06);
      transition: right .45s cubic-bezier(.22,1,.36,1);
    }

    .info-panel.visible { right: 20px; }

    .info-panel .close-btn {
      position: absolute; top: 12px; right: 14px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: none; color: #fff;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }

    .info-panel .close-btn:hover { background: rgba(255,80,80,.3); }

    .planet-header {
      display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
    }

    .planet-sphere {
      width: 64px; height: 64px; border-radius: 50%;
      box-shadow: 0 0 20px var(--glow), inset -8px -4px 12px rgba(0,0,0,.4);
    }

    .planet-header h2 { font-size: 1.6rem; font-weight: 700; }
    .planet-header .subtitle { font-size: .85rem; color: #89a; margin-top: 2px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }

    .info-card {
      background: rgba(255,255,255,.04); border-radius: 10px; padding: 12px;
      border: 1px solid rgba(255,255,255,.06);
    }

    .info-card .label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: #6a8; margin-bottom: 4px; }
    .info-card .value { font-size: 1.05rem; font-weight: 600; }

    .planet-description {
      font-size: .9rem; line-height: 1.65; color: #bcd;
      border-top: 1px solid rgba(255,255,255,.08); padding-top: 16px;
    }

    /* ── Tooltip on hover ───────────────────────────── */
    .tooltip {
      position: fixed; z-index: 30; pointer-events: none;
      background: rgba(10,15,30,.85); border: 1px solid rgba(100,170,255,.3);
      padding: 6px 14px; border-radius: 8px; font-size: .85rem;
      transform: translate(-50%, -120%);
      opacity: 0; transition: opacity .2s;
    }

    .tooltip.visible { opacity: 1; }

    /* ── Bottom Legend ──────────────────────────────── */
    .legend {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; gap: 14px; padding: 10px 20px;
      background: rgba(10,15,30,.7); border-radius: 30px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    .legend-item {
      display: flex; align-items: center; gap: 6px; font-size: .75rem; color: #abc; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background .2s, color .2s;
    }

    .legend-item:hover { background: rgba(255,255,255,.1); color: #fff; }

    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* ── Loading Screen ─────────────────────────────── */
    .loader {
      position: fixed; inset: 0; z-index: 100;
      background: #060a14; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      transition: opacity .6s;
    }

    .loader.hidden { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 3px solid rgba(100,170,255,.15);
      border-top-color: #6af; animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader p { color: #89a; font-size: .9rem; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div class="loader" id="loader">
  <div class="loader-ring"></div>
  <p>Loading Solar System…</p>
</div>

<!-- Top Bar -->
<div class="top-bar">
  <h1>☀️ Interactive Solar System</h1>
  <div class="controls">
    <div class="speed-control">
      <span>Speed</span>
      <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="1" />
      <span id="speedLabel">1×</span>
    </div>
  </div>
</div>

<!-- Planet Info Panel -->
<div class="info-panel" id="infoPanel">
  <button class="close-btn" id="closeBtn">✕</button>
  <div class="planet-header">
    <div class="planet-sphere" id="planetSphere"></div>
    <div>
      <h2 id="planetName"></h2>
      <div class="subtitle" id="planetSubtitle"></div>
    </div>
  </div>
  <div class="info-grid" id="infoGrid"></div>
  <div class="planet-description" id="planetDesc"></div>
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<!-- Bottom Legend -->
<div class="legend" id="legend"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ═══════════════════════════════════════════════════════
   PLANET DATA
   ═══════════════════════════════════════════════════════ */
const PLANETS = [
  {

  },
  {

    color: '#e8c77a', emissive: '#2a2010',
    tilt: 177.4 * Math.PI / 180, moons: 0, temperature: '462 °C (mean)',
    distanceFromSun: '108.2 million km', mass: '4.87 × 10²⁴ kg',

  },

    color: '#4a8ec9', emissive: '#0a1520',
    tilt: 23.4 * Math.PI / 180, moons: 1, temperature: '−89 to 57 °C',
    distanceFromSun: '149.6 million km', mass: '5.97 × 10²⁴ kg',
    diameter: '12,756 km', type: 'Terrestrial',

  },
  {
    name: 'Mars', subtitle: 'The Red Planet',
    radius: 0.6, orbitRadius: 21, period: 1.88, rotationPeriod: 1.03,
    color: '#c45a30', emissive: '#1a0a05',
    tilt: 25.2 * Math.PI / 180, moons: 2, temperature: '−87 to −5 °C',
    distanceFromSun: '227.9 million km', mass: '6.42 × 10²³ kg',
    diameter: '6,792 km', type: 'Terrestrial',

  },
  {

    distanceFromSun: '778.6 million km', mass: '1.90 × 10²⁷ kg',
    diameter: '142,984 km', type: 'Gas Giant',
    description: 'Jupiter is the largest planet—so massive that over 1,300 Earths could fit inside it. Its iconic Great Red Spot is a storm larger than Earth that has raged for centuries. Jupiter\'s immense gravity helps shield inner planets from asteroids.'

  {
    name: 'Saturn', subtitle: 'The Ringed Jewel',
    radius: 2.3, orbitRadius: 40, period: 29.46, rotationPeriod: 0.45,

    distanceFromSun: '1,433.5 million km', mass: '5.68 × 10²⁶ kg',

    description: 'Saturn\'s spectacular ring system spans up to 282,000 km but is astonishingly thin—only about 10–100 meters thick. Made of ice and rock particles ranging from dust grains to house-sized boulders, they are one of the solar system\'s most breathtaking sights.'

  {

    radius: 1.6, orbitRadius: 52, period: 84.01, rotationPeriod: -0.72,

    tilt: 97.8 * Math.PI / 180, moons: 28, temperature: '−197 °C (cloud top)',
    distanceFromSun: '2,866.5 million km', mass: '8.68 × 10²⁵ kg',
    diameter: '51,118 km', type: 'Ice Giant', rings: true, faintRings: true,
    description: 'Uranus is unique—it rotates on its side with an axial tilt of 98°, likely from a colossal ancient collision. This means it essentially rolls around the Sun. Its blue-green hue comes from methane in its atmosphere absorbing red light.'
  },
  {
    name: 'Neptune', subtitle: 'The Distant World',
    radius: 1.5, orbitRadius: 64, period: 164.8, rotationPeriod: 0.67,
    color: '#3a5ac9', emissive: '#050a20',
    tilt: 28.3 * Math.PI / 180, moons: 16, temperature: '−201 °C (cloud top)',
    distanceFromSun: '4,495.1 million km', mass: '1.02 × 10²⁶ kg',
    diameter: '49,528 km', type: 'Ice Giant',
    description: 'Neptune is the windiest planet with speeds exceeding 2,100 km/h—supersonic! Its vivid blue color comes from methane. Despite its great distance from the Sun, Neptune still generates internal heat, driving violent storms and a dark spot similar to Jupiter\'s.'

/* ═══════════════════════════════════════════════════════
   SCENE SETUP
   ═══════════════════════════════════════════════════════ */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
camera.position.set(30, 45, 60);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 5;
controls.maxDistance = 200;
controls.autoRotate = false;
controls.autoRotateSpeed = 0.3;

/* ═══════════════════════════════════════════════════════
   LIGHTING
   ═══════════════════════════════════════════════════════ */
const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xfff5e0, 2.5, 500, 0.5);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

/* ═══════════════════════════════════════════════════════
   STARFIELD
   ═══════════════════════════════════════════════════════ */
function createStarfield() {
  const count = 6000;
  const positions = new Float32Array(count * 3);
  const colors    = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    const r   = 400 + Math.random() * 600;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);

    positions[i*3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3 + 2] = r * Math.cos(phi);

    const temp = Math.random();
    if (temp < 0.15) { colors[i*3]=0.6; colors[i*3+1]=0.7; colors[i*3+2]=1.0; }
    else if (temp < 0.4) { colors[i*3]=1.0; colors[i*3+1]=0.95; colors[i*3+2]=0.8; }
    else { colors[i*3]=1.0; colors[i*3+1]=1.0; colors[i*3+2]=1.0; }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 1.2, vertexColors: true, transparent: true, opacity: 0.85,
    sizeAttenuation: false, blending: THREE.AdditiveBlending, depthWrite: false
  });

  scene.add(new THREE.Points(geo, mat));
}
createStarfield();

/* ═══════════════════════════════════════════════════════
   PROCEDURAL TEXTURES (canvas-based)
   ═══════════════════════════════════════════════════════ */
function makeTexture(baseColor, type, detail = 0.5) {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 256;
  const ctx = canvas.getContext('2d');

  // Base fill
  ctx.fillStyle = baseColor;
  ctx.fillRect(0, 0, 512, 256);

  // Add noise / bands
  if (type === 'gas') {
    for (let band = 0; band < 18; band++) {
      const y = Math.random() * 256;
      const h = 4 + Math.random() * 18;
      ctx.fillStyle = `rgba(${Math.random()>0.5?255:0},${Math.random()>0.5?255:0},${Math.random()>0.5?255:0}, ${0.03 + detail * 0.06})`;
      ctx.fillRect(0, y, 512, h);
    }
  }

  if (type === 'rocky') {
    for (let i = 0; i < 400; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 256;
      const r = 1 + Math.random() * 8;
      ctx.fillStyle = `rgba(${Math.floor(Math.random()*80)},${Math.floor(Math.random()*60)},${Math.floor(Math.random()*40)}, ${0.1 + detail * 0.3})`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
    }
  }

  if (type === 'earth') {
    // Oceans already blue; add green continents
    for (let i = 0; i < 60; i++) {
      const x = Math.random() * 512;
      const y = 40 + Math.random() * 176;
      ctx.fillStyle = `rgba(${30+Math.floor(Math.random()*40)},${80+Math.floor(Math.random()*80)},${20+Math.floor(Math.random()*30)}, ${0.4 + Math.random()*0.4})`;
      ctx.beginPath();
      ctx.ellipse(x, y, 15+Math.random()*40, 8+Math.random()*25, Math.random()*Math.PI, 0, Math.PI*2);
      ctx.fill();
    }
    // Polar caps
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillRect(0, 0, 512, 18);
    ctx.fillRect(0, 238, 512, 18);
    // Clouds
    for (let i = 0; i < 30; i++) {
      ctx.fillStyle = `rgba(255,255,255,${0.05 + Math.random()*0.15})`;
      ctx.beginPath();
      ctx.ellipse(Math.random()*512, Math.random()*256, 30+Math.random()*60, 4+Math.random()*8, Math.random(), 0, Math.PI*2);
      ctx.fill();
    }
  }

  if (type === 'mars') {
    for (let i = 0; i < 200; i++) {
      const x = Math.random() * 512;
      const y = Math.random() * 256;
      ctx.fillStyle = `rgba(${140+Math.floor(Math.random()*60)},${40+Math.floor(Math.random()*30)},${10+Math.floor(Math.random()*20)}, ${0.1 + detail*0.2})`;
      ctx.beginPath(); ctx.arc(x, y, 2+Math.random()*12, 0, Math.PI*2); ctx.fill();
    }
    // Polar cap
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(0, 0, 512, 14);
    ctx.fillRect(0, 242, 512, 14);
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

/* ═══════════════════════════════════════════════════════
   SUN
   ═══════════════════════════════════════════════════════ */
const sunGeo = new THREE.SphereGeometry(3.5, 64, 64);
const sunCanvas = document.createElement('canvas');
sunCanvas.width = 1024; sunCanvas.height = 512;
const sCtx = sunCanvas.getContext('2d');

// Sun gradient texture
const grad = sCtx.createRadialGradient(512, 256, 0, 512, 256, 512);
grad.addColorStop(0, '#fff8e0');
grad.addColorStop(0.3, '#ffcc44');
grad.addColorStop(0.7, '#ff9922');
grad.addColorStop(1, '#cc5500');
sCtx.fillStyle = grad;
sCtx.fillRect(0, 0, 1024, 512);

// Granulation noise
for (let i = 0; i < 800; i++) {
  sCtx.fillStyle = `rgba(${200+Math.floor(Math.random()*55)},${150+Math.floor(Math.random()*80)},${Math.floor(Math.random()*40)}, ${0.05 + Math.random()*0.1})`;
  sCtx.beginPath();
  sCtx.arc(Math.random()*1024, Math.random()*512, 3+Math.random()*10, 0, Math.PI*2);
  sCtx.fill();
}

const sunTex = new THREE.CanvasTexture(sunCanvas);
const sunMat = new THREE.MeshBasicMaterial({ map: sunTex });
const sunMesh = new THREE.Mesh(sunGeo, sunMat);
scene.add(sunMesh);

// Sun glow sprite
const glowCanvas = document.createElement('canvas');
glowCanvas.width = 256; glowCanvas.height = 256;
const gCtx = glowCanvas.getContext('2d');
const glowGrad = gCtx.createRadialGradient(128, 128, 0, 128, 128, 128);
glowGrad.addColorStop(0, 'rgba(255,220,100,0.6)');
glowGrad.addColorStop(0.3, 'rgba(255,180,50,0.3)');
glowGrad.addColorStop(0.7, 'rgba(255,120,20,0.08)');
glowGrad.addColorStop(1, 'rgba(255,80,0,0)');
gCtx.fillStyle = glowGrad;
gCtx.fillRect(0, 0, 256, 256);

const glowTex = new THREE.CanvasTexture(glowCanvas);
const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending });
const sunGlow = new THREE.Sprite(glowMat);
sunGlow.scale.set(18, 18, 1);
scene.add(sunGlow);

/* ═══════════════════════════════════════════════════════
   PLANETS & ORBITS
   ═══════════════════════════════════════════════════════ */
const planetMeshes = [];
const orbitLines  = [];
const planetGroups = [];

PLANETS.forEach((p, i) => {
  // ── Orbit ring ──────────────────────────────────────
  const orbitGeo = new THREE.BufferGeometry();
  const orbitPts = [];
  for (let j = 0; j <= 256; j++) {
    const angle = (j / 256) * Math.PI * 2;
    orbitPts.push(Math.cos(angle) * p.orbitRadius, 0, Math.sin(angle) * p.orbitRadius);
  }
  orbitGeo.setAttribute('position', new THREE.Float32BufferAttribute(orbitPts, 3));

  const orbitMat = new THREE.LineBasicMaterial({
    color: new THREE.Color(p.color), transparent: true, opacity: 0.18
  });
  const orbitLine = new THREE.Line(orbitGeo, orbitMat);
  scene.add(orbitLine);
  orbitLines.push(orbitLine);

  // ── Planet mesh ─────────────────────────────────────
  let texType = 'rocky';
  if (p.name === 'Earth') texType = 'earth';
  else if (p.name === 'Mars') texType = 'mars';
  else if (['Jupiter','Saturn'].includes(p.name)) texType = 'gas';

  const texture = makeTexture(p.color, texType);
  const geo = new THREE.SphereGeometry(p.radius, 48, 32);
  const mat = new THREE.MeshStandardMaterial({
    map: texture, emissive: new THREE.Color(p.emissive),
    emissiveIntensity: 0.15, roughness: 0.7, metalness: 0.1
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { planetIndex: i };

  // ── Planet group (for tilt) ─────────────────────────
  const group = new THREE.Group();
  group.add(mesh);
  mesh.rotation.z = p.tilt || 0;

  // ── Rings for Saturn & Uranus ───────────────────────
  if (p.rings) {
    const innerR = p.radius * 1.4;
    const outerR = p.radius * (p.faintRings ? 2.0 : 2.8);

    // Ring texture
    const ringCanvas = document.createElement('canvas');
    ringCanvas.width = 512; ringCanvas.height = 64;
    const rCtx = ringCanvas.getContext('2d');

    if (p.faintRings) {
      for (let x = 0; x < 512; x++) {
        const alpha = Math.random() * 0.15;
        rCtx.fillStyle = `rgba(140,180,200,${alpha})`;
        rCtx.fillRect(x, 0, 1, 64);
      }
    } else {
      for (let x = 0; x < 512; x++) {
        const t = x / 512;
        // Cassini division gap
        let alpha = 0.7 + Math.random() * 0.3;
        if (t > 0.48 && t < 0.55) alpha *= 0.1; // gap
        const r = 180 + Math.floor(Math.random()*60);
        const g = 160 + Math.floor(Math.random()*40);
        const b = 120 + Math.floor(Math.random()*30);
        rCtx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        rCtx.fillRect(x, 0, 1, 64);
      }
    }

    const ringTex = new THREE.CanvasTexture(ringCanvas);
    const ringGeo = new THREE.RingGeometry(innerR, outerR, 80);
    // Fix UVs for radial mapping
    const uvs = ringGeo.attributes.uv;
    const pos = ringGeo.attributes.position;
    for (let j = 0; j < uvs.count; j++) {
      const x = pos.getX(j), y = pos.getY(j);
      const dist = Math.sqrt(x*x + y*y);
      uvs.setXY(j, (dist - innerR) / (outerR - innerR), 0.5);
    }

    const ringMat = new THREE.MeshStandardMaterial({
      map: ringTex, side: THREE.DoubleSide, transparent: true, opacity: p.faintRings ? 0.3 : 0.8,
      roughness: 0.9, metalness: 0.0
    });

    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
  }

  // ── Earth's Moon ────────────────────────────────────
  if (p.name === 'Earth') {
    const moonGeo = new THREE.SphereGeometry(0.25, 24, 16);
    const moonTex = makeTexture('#b0b0b0', 'rocky');
    const moonMat = new THREE.MeshStandardMaterial({ map: moonTex, roughness: 0.9 });
    const moonMesh = new THREE.Mesh(moonGeo, moonMat);
    group.add(moonMesh);
    mesh.userData.moon = moonMesh;
  }

  scene.add(group);
  planetGroups.push(group);
  planetMeshes.push(mesh);
});

/* ═══════════════════════════════════════════════════════
   RAYCASTING & INTERACTION
   ═══════════════════════════════════════════════════════ */
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();
let selectedPlanet = null;

// DOM refs
const infoPanel    = document.getElementById('infoPanel');
const planetName   = document.getElementById('planetName');
const planetSubtitle= document.getElementById('planetSubtitle');
const planetSphere = document.getElementById('planetSphere');
const infoGrid     = document.getElementById('infoGrid');
const planetDesc   = document.getElementById('planetDesc');
const closeBtn     = document.getElementById('closeBtn');
const tooltip      = document.getElementById('tooltip');
const legend       = document.getElementById('legend');

// Build legend
PLANETS.forEach((p, i) => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="legend-dot" style="background:${p.color}"></span>${p.name}`;
  item.addEventListener('click', () => focusPlanet(i));
  legend.appendChild(item);
});

// Show info panel
function showInfo(index) {
  const p = PLANETS[index];
  planetName.textContent = p.name;
  planetSubtitle.textContent = p.subtitle;
  planetSphere.style.background = `radial-gradient(circle at 35% 35%, ${p.color}, #111)`;
  planetSphere.style.setProperty('--glow', p.color);

  infoGrid.innerHTML = [
    { label: 'Type', value: p.type },
    { label: 'Diameter', value: p.diameter },
    { label: 'Distance from Sun', value: p.distanceFromSun },
    { label: 'Mass', value: p.mass },
    { label: 'Temperature', value: p.temperature },
    { label: 'Orbital Period', value: `${p.period} Earth years` },
    { label: 'Day Length', value: `${Math.abs(p.rotationPeriod)} Earth days${p.rotationPeriod < 0 ? ' (retrograde)' : ''}` },
    { label: 'Moons', value: p.moons }
  ].map(c => `<div class="info-card"><div class="label">${c.label}</div><div class="value">${c.value}</div></div>`).join('');

  planetDesc.textContent = p.description;
  infoPanel.classList.add('visible');
  selectedPlanet = index;
}

function hideInfo() {
  infoPanel.classList.remove('visible');
  selectedPlanet = null;
}

closeBtn.addEventListener('click', hideInfo);

// Focus camera on a planet
function focusPlanet(index) {
  const p = PLANETS[index];
  const mesh = planetMeshes[index];
  const worldPos = new THREE.Vector3();
  mesh.getWorldPosition(worldPos);

  // Smoothly move camera
  const offset = new THREE.Vector3(p.radius * 4, p.radius * 2.5, p.radius * 4);
  const targetCamPos = worldPos.clone().add(offset);

  showInfo(index);

  // Animate camera
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const duration = 1000;
  const startTime = performance.now();

  function animateCamera(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2; // easeInOutQuad

    camera.position.lerpVectors(startPos, targetCamPos, ease);
    controls.target.lerpVectors(startTarget, worldPos, ease);
    controls.update();

    if (t < 1) requestAnimationFrame(animateCamera);
  }
  requestAnimationFrame(animateCamera);
}

// Click handler
renderer.domElement.addEventListener('click', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(planetMeshes);
  if (hits.length > 0) {
    const idx = hits[0].object.userData.planetIndex;
    focusPlanet(idx);
  } else {
    hideInfo();
  }
});

// Hover tooltip
renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObjects(planetMeshes);
  if (hits.length > 0) {
    renderer.domElement.style.cursor = 'pointer';
    tooltip.textContent = PLANETS[hits[0].object.userData.planetIndex].name;
    tooltip.style.left = e.clientX + 'px';
    tooltip.style.top  = e.clientY + 'px';
    tooltip.classList.add('visible');
  } else {
    renderer.domElement.style.cursor = 'grab';
    tooltip.classList.remove('visible');
  }
});

/* ═══════════════════════════════════════════════════════
   SPEED CONTROL
   ═══════════════════════════════════════════════════════ */
const speedSlider = document.getElementById('speedSlider');
const speedLabel  = document.getElementById('speedLabel');
let simSpeed = 1;

speedSlider.addEventListener('input', () => {
  simSpeed = parseFloat(speedSlider.value);
  speedLabel.textContent = `${simSpeed.toFixed(1)}×`;
});

/* ═══════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta() * simSpeed;
  const elapsed = clock.elapsedTime * simSpeed;

  // Sun rotation & glow pulse
  sunMesh.rotation.y += dt * 0.05;
  const pulse = 1 + Math.sin(elapsed * 2) * 0.08;
  sunGlow.scale.set(18 * pulse, 18 * pulse, 1);

  // Planet orbits & rotation
  PLANETS.forEach((p, i) => {
    const mesh = planetMeshes[i];
    const group = planetGroups[i];

    // Orbital position (angular speed inversely proportional to period)
    const angle = elapsed * (2 * Math.PI / (p.period * 10));
    mesh.position.x = Math.cos(angle) * p.orbitRadius;
    mesh.position.z = Math.sin(angle) * p.orbitRadius;

    // Self-rotation
    mesh.rotation.y += dt * (Math.abs(p.rotationPeriod) > 0 ? (2*Math.PI / (Math.abs(p.rotationPeriod) * 2)) : 0.5);

    // Moon orbit for Earth
    if (mesh.userData.moon) {
      const moonAngle = elapsed * 2.5;
      mesh.userData.moon.position.x = Math.cos(moonAngle) * 1.8;
      mesh.userData.moon.position.z = Math.sin(moonAngle) * 1.8;
      mesh.userData.moon.position.y = Math.sin(moonAngle * 0.3) * 0.2;
    }

    // Update controls target if planet is selected
    if (selectedPlanet === i) {
      const wp = new THREE.Vector3();
      mesh.getWorldPosition(wp);
      controls.target.lerp(wp, 0.05);
    }
  });

  controls.update();
  renderer.render(scene, camera);
}

/* ═══════════════════════════════════════════════════════
   RESIZE HANDLER
   ═══════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ═══════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
   ═══════════════════════════════════════════════════════ */
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') hideInfo();
  if (e.key >= '1' && e.key <= '8') focusPlanet(parseInt(e.key) - 1);
});

/* ═══════════════════════════════════════════════════════
   START
   ═══════════════════════════════════════════════════════ */
// Hide loader after a brief delay
setTimeout(() => {
  document.getElementById('loader').classList.add('hidden');
}, 800);

animate();
</script>
